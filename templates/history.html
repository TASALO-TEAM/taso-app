{% extends "base.html" %}

{% block title %}TASALO - Historial{% endblock %}

{% block content %}
<!-- Header -->
<header class="page-header">
  <a href="/" data-nav-link class="back-button" aria-label="Volver">
    <span>←</span>
  </a>
  <h1 class="page-title">📈 Historial</h1>
  <div class="w-11"></div>
</header>

<!-- Loading State -->
<div id="chart-loading" class="glass-card-v2 rounded-xl p-8 mb-4 hidden">
  <div class="skeleton-v2 h-64 w-full"></div>
</div>

<!-- Error State -->
<div id="chart-error" class="glass-card-v2 rounded-xl p-6 mb-4 hidden">
  <p class="text-center text-2 mb-4">No se pudo cargar el histórico</p>
  <button id="retry-btn" class="w-full btn-primary-v2 py-2">Reintentar</button>
</div>

<!-- View Toggle -->
<div class="glass-card-v2 rounded-xl p-4 mb-4">
  <div class="flex gap-2 mb-4">
    <button id="view-combined" class="flex-1 btn-primary-v2 py-2 active" onclick="switchView('combined')">
      📊 Vista Combinada
    </button>
    <button id="view-separated" class="flex-1 btn-primary-v2 py-2" onclick="switchView('separated')">
      📈📈📈 Vista Separada
    </button>
  </div>
  
  <!-- Filters -->
  <div class="flex gap-2 mb-4">
    <select id="days-select" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
      <option value="1">1 día</option>
      <option value="7">7 días</option>
      <option value="14">14 días</option>
      <option value="30" selected>30 días</option>
      <option value="60">60 días</option>
      <option value="90">90 días</option>
      <option value="180">6 meses</option>
      <option value="365">1 año</option>
      <option value="730">2 años</option>
    </select>
    <button id="update-chart" class="flex-1 btn-primary-v2 py-2">
      Actualizar
    </button>
  </div>
</div>

<!-- Combined View (1 chart with 3 lines) -->
<div id="combined-view" class="glass-card-v2 rounded-xl p-4 mb-4">
  <h2 class="text-lg font-semibold mb-4">Evolución USD/EUR/MLC → CUP</h2>
  <canvas id="combined-chart"></canvas>
</div>

<!-- Separated View (3 individual charts) -->
<div id="separated-view" class="space-y-4 hidden">
  <div class="glass-card-v2 rounded-xl p-4">
    <h2 class="text-lg font-semibold mb-4">🇺🇸 USD → CUP</h2>
    <canvas id="usd-chart"></canvas>
  </div>
  <div class="glass-card-v2 rounded-xl p-4">
    <h2 class="text-lg font-semibold mb-4">🇪🇺 EUR → CUP</h2>
    <canvas id="eur-chart"></canvas>
  </div>
  <div class="glass-card-v2 rounded-xl p-4">
    <h2 class="text-lg font-semibold mb-4">🧾 MLC → CUP</h2>
    <canvas id="mlc-chart"></canvas>
  </div>
</div>

<!-- Last Update Timestamp -->
<div id="chart-timestamp" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Floating Navigation -->
<nav class="floating-nav">
  <div class="floating-nav-inner">
    <a href="/" data-nav-link class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="/history" data-nav-link class="nav-item active">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Historial</span>
    </a>
    <a href="/provincias" data-nav-link class="nav-item">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Provincias</span>
    </a>
    <a href="/settings" data-nav-link class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </a>
  </div>
</nav>

<!-- TASALO App JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script>
  // Fix navigation links to include base path if needed
  document.querySelectorAll('[data-nav-link]').forEach(link => {
    const basePath = window.TASALO_BASE_PATH || '';
    const href = link.getAttribute('href');
    if (basePath && !href.startsWith(basePath)) {
      link.setAttribute('href', basePath + href);
    }
  });

  // Set active nav item based on current page
  const currentPath = window.location.pathname.replace('/miniapp', '') || '/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = item.getAttribute('href');
    if (href === currentPath) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
</script>
{% endblock %}
