{% extends "base.html" %}

{% block title %}TASALO - Historial{% endblock %}

{% block content %}
<!-- Header -->
<header class="flex justify-between items-center mb-6">
  <a href="/" class="text-gray-400 hover:text-accent transition-colors">
    <span class="text-xl">←</span>
  </a>
  <h1 class="text-2xl font-bold font-ui text-accent">📈 Historial</h1>
  <div class="w-6"></div>
</header>

<!-- Loading State -->
<div id="chart-loading" class="glass-card rounded-xl p-8 mb-4 hidden">
  <div class="skeleton h-64 w-full"></div>
</div>

<!-- Error State -->
<div id="chart-error" class="glass-card rounded-xl p-6 mb-4 hidden">
  <p class="text-center text-2 mb-4">No se pudo cargar el histórico</p>
  <button id="retry-btn" class="w-full btn-primary py-2">Reintentar</button>
</div>

<!-- Chart Container -->
<div id="chart-container" class="glass-card rounded-xl p-4 mb-4 hidden">
  <canvas id="history-chart"></canvas>
</div>

<!-- Filters -->
<div class="glass-card rounded-xl p-4 mb-4">
  <div class="flex gap-2 mb-4">
    <select id="currency-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="MLC">MLC</option>
    </select>
    <select id="days-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
      <option value="7">7 días</option>
      <option value="14">14 días</option>
      <option value="30">30 días</option>
    </select>
  </div>
  <button id="update-chart" class="w-full bg-accent hover:bg-accent/80 text-white font-medium py-2 rounded-lg transition-colors">
    Actualizar
  </button>
</div>

<!-- Last Update Timestamp -->
<div id="chart-timestamp" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-tasalo-bg-glass backdrop-blur-lg border-t border-white/10 p-4">
  <div class="flex justify-around max-w-lg mx-auto">
    <a href="/" class="text-gray-400 hover:text-accent transition-colors">📊 Inicio</a>
    <a href="/history" class="text-accent font-medium">📈 Historial</a>
    <a href="/provincias" class="text-gray-400 hover:text-accent transition-colors">🗺️ Provincias</a>
    <a href="/settings" class="text-gray-400 hover:text-accent transition-colors">⚙️ Settings</a>
  </div>
</nav>
{% endblock %}
