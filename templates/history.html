{% extends "base.html" %}

{% block title %}TASALO - Historial{% endblock %}

{% block content %}
<!-- Header -->
<header class="page-header">
  <a href="/" data-nav-link class="back-button" aria-label="Volver">
    <span>←</span>
  </a>
  <h1 class="page-title">📈 Historial</h1>
  <div class="w-11"></div>
</header>

<!-- Loading State -->
<div id="chart-loading" class="glass-card-v2 rounded-xl p-8 mb-4 hidden">
  <div class="skeleton-v2 h-64 w-full"></div>
</div>

<!-- Error State -->
<div id="chart-error" class="glass-card-v2 rounded-xl p-6 mb-4 hidden">
  <p class="text-center text-2 mb-4">No se pudo cargar el histórico</p>
  <button id="retry-btn" class="w-full btn-primary-v2 py-2">Reintentar</button>
</div>

<!-- Chart Container -->
<div id="chart-container" class="glass-card-v2 rounded-xl p-4 mb-4 hidden">
  <canvas id="history-chart"></canvas>
</div>

<!-- Filters -->
<div class="glass-card-v2 rounded-xl p-4 mb-4">
  <div class="flex gap-2 mb-4">
    <select id="currency-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="MLC">MLC</option>
    </select>
    <select id="days-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
      <option value="7">7 días</option>
      <option value="14">14 días</option>
      <option value="30">30 días</option>
    </select>
  </div>
  <button id="update-chart" class="w-full btn-primary-v2 py-2">
    Actualizar
  </button>
</div>

<!-- Last Update Timestamp -->
<div id="chart-timestamp" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Floating Navigation -->
<nav class="floating-nav">
  <div class="floating-nav-inner">
    <a href="/" data-nav-link class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="/history" data-nav-link class="nav-item active">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Historial</span>
    </a>
    <a href="/provincias" data-nav-link class="nav-item">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Provincias</span>
    </a>
    <a href="/settings" data-nav-link class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </a>
  </div>
</nav>

<script>
  // Fix navigation links to include base path if needed
  document.querySelectorAll('[data-nav-link]').forEach(link => {
    const basePath = window.TASALO_BASE_PATH || '';
    const href = link.getAttribute('href');
    if (basePath && !href.startsWith(basePath)) {
      link.setAttribute('href', basePath + href);
    }
  });
  
  // Set active nav item based on current page
  const currentPath = window.location.pathname.replace('/miniapp', '') || '/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = item.getAttribute('href');
    if (href === currentPath) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
</script>
{% endblock %}
