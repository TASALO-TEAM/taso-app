{% extends "base.html" %}

{% block title %}TASALO - Configuración{% endblock %}

{% block content %}
<!-- Header -->
<header class="mb-6">
  <h1 class="text-2xl font-bold font-ui text-accent">⚙️ Configuración</h1>
</header>

<!-- Settings Form -->
<div class="glass-card-v2 space-y-6">
  <!-- Theme Selector -->
  <div>
    <label class="block text-sm font-medium text-2 mb-2">🎨 Tema</label>
    <div class="flex gap-3">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="theme"
          value="light"
          id="theme-light"
          class="accent-accent"
        >
        <span>☀️ Claro</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="theme"
          value="dark"
          id="theme-dark"
          class="accent-accent"
        >
        <span>🌙 Oscuro</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="theme"
          value="auto"
          id="theme-auto"
          class="accent-accent"
        >
        <span>🔄 Auto</span>
      </label>
    </div>
  </div>

  <!-- Refresh Interval Selector -->
  <div>
    <label class="block text-sm font-medium text-2 mb-2">⏱️ Auto-refresh</label>
    <select
      id="refresh-interval"
      class="w-full bg-bg-glass border border-border rounded-lg px-4 py-2 text-ui focus:outline-none focus:border-accent"
    >
      <option value="30000">30 segundos</option>
      <option value="60000">60 segundos</option>
      <option value="120000">2 minutos</option>
    </select>
  </div>

  <!-- Display Preferences Section -->
  <div class="settings-section-v2">
    <h2 class="settings-section-title">📱 Display Preferences</h2>
    
    <!-- Layout Mode -->
    <div class="settings-option">
      <label class="settings-option-label">Layout Mode</label>
      <div class="settings-radio-group">
        <label class="settings-radio-item">
          <input type="radio" name="layoutMode" value="vertical">
          <span class="settings-radio-text">Vertical List</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="layoutMode" value="horizontal" checked>
          <span class="settings-radio-text">Horizontal Cards (Default)</span>
        </label>
      </div>
    </div>
    
    <!-- Card Size (only for horizontal mode) -->
    <div class="settings-option" id="cardSizeOption" style="display: none;">
      <label class="settings-option-label">Card Size</label>
      <div class="settings-radio-group">
        <label class="settings-radio-item">
          <input type="radio" name="cardSize" value="compact">
          <span class="settings-radio-text">Compact (120px)</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="cardSize" value="standard" checked>
          <span class="settings-radio-text">Standard (140px)</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="cardSize" value="wide">
          <span class="settings-radio-text">Wide (160px)</span>
        </label>
      </div>
    </div>
    
    <!-- Show Binance Ticker -->
    <div class="settings-option">
      <label class="settings-option-label">Show Binance Ticker</label>
      <div class="settings-radio-group">
        <label class="settings-radio-item">
          <input type="radio" name="showTicker" value="true" checked>
          <span class="settings-radio-text">Enabled</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="showTicker" value="false">
          <span class="settings-radio-text">Disabled</span>
        </label>
      </div>
    </div>
    
    <!-- Ticker Speed -->
    <div class="settings-option" id="tickerSpeedOption">
      <label class="settings-option-label">Ticker Speed</label>
      <div class="settings-radio-group">
        <label class="settings-radio-item">
          <input type="radio" name="tickerSpeed" value="slow">
          <span class="settings-radio-text">Slow (60s)</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="tickerSpeed" value="normal" checked>
          <span class="settings-radio-text">Normal (40s)</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="tickerSpeed" value="fast">
          <span class="settings-radio-text">Fast (20s)</span>
        </label>
      </div>
    </div>
    
    <!-- Binance Currencies -->
    <div class="settings-option">
      <label class="settings-option-label">Ticker Currencies</label>
      <div class="settings-currency-grid" id="tickerCurrenciesGrid">
        <!-- Checkboxes rendered by JS -->
      </div>
    </div>
    
    <!-- Show Flags -->
    <div class="settings-option">
      <label class="settings-option-label">Show Flags on Cards</label>
      <div class="settings-radio-group">
        <label class="settings-radio-item">
          <input type="radio" name="showFlags" value="true" checked>
          <span class="settings-radio-text">Enabled</span>
        </label>
        <label class="settings-radio-item">
          <input type="radio" name="showFlags" value="false">
          <span class="settings-radio-text">Disabled</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3 pt-4">
    <button
      id="save-settings"
      class="btn-primary-v2 flex-1 py-3 px-4"
    >
      💾 Guardar
    </button>
    <a
      href="/"
      class="flex-1 text-center py-3 px-4 border border-border rounded-lg text-ui hover:bg-bg-glass transition-colors btn-secondary-v2"
    >
      ↩️ Volver
    </a>
  </div>

  <!-- Success Message -->
  <div
    id="success-message"
    class="hidden bg-green-900/20 border border-green-500/30 rounded-lg p-4 text-green-400 text-center"
  >
    <p class="font-medium">✅ Configuración guardada</p>
  </div>
</div>

<!-- Last Update Timestamp -->
<div id="settings-timestamp" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Floating Navigation -->
<nav class="floating-nav">
  <div class="floating-nav-inner">
    <a href="/" data-nav-link class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Inicio</span>
    </a>
    <a href="/history" data-nav-link class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Historial</span>
    </a>
    <a href="/provincias" data-nav-link class="nav-item">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Provincias</span>
    </a>
    <a href="/settings" data-nav-link class="nav-item active">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </a>
  </div>
</nav>

<script>
  // Fix navigation links to include base path if needed
  document.querySelectorAll('[data-nav-link]').forEach(link => {
    const basePath = window.TASALO_BASE_PATH || '';
    const href = link.getAttribute('href');
    if (basePath && !href.startsWith(basePath)) {
      link.setAttribute('href', basePath + href);
    }
  });
  
  // Set active nav item based on current page
  const currentPath = window.location.pathname.replace('/miniapp', '') || '/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = item.getAttribute('href');
    if (href === currentPath) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
