{% extends "base.html" %}

{% block title %}TASALO - Tasas de Cambio{% endblock %}

{% block content %}
<!-- Header -->
<header class="page-header">
  <h1 class="page-title">TASALO</h1>
  <button id="refresh-btn" class="back-button" aria-label="Actualizar tasas">
    <span>⟳</span>
  </button>
</header>

<!-- Binance Ticker Tape -->
<div id="tickerContainer" class="ticker-tape-container">
  <div class="ticker-tape-body" id="tickerBody">
    <div class="ticker-tape-wrapper">
      <div class="ticker-tape-strip" id="tickerStrip">
        <!-- Ticker items rendered by JS -->
        <span style="padding: 0 16px; font-size: 10px; color: var(--text3);">Cargando...</span>
      </div>
    </div>
  </div>
</div>

<!-- Loading State (Skeleton) -->
<div id="loading" class="space-y-4">
  <div class="glass-card-v2">
    <div class="skeleton-v2 h-6 w-32 mb-4 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-2/3 rounded"></div>
  </div>
  <div class="glass-card-v2">
    <div class="skeleton-v2 h-6 w-32 mb-4 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-2/3 rounded"></div>
  </div>
</div>

<!-- Error State -->
<div id="error" class="hidden bg-red-900/20 border border-red-500/30 rounded-lg p-4 text-red-400">
  <p class="font-medium">⚠️ Error al cargar datos</p>
  <p class="text-sm mt-1">Verifica tu conexión e intenta nuevamente.</p>
  <button onclick="loadRates()" class="mt-3 btn-primary-v2 text-sm py-2 px-4">
    Reintentar
  </button>
</div>

<!-- Content Container -->
<div id="rates-container" class="space-y-4 hidden">
  <!-- Secciones se renderizan dinámicamente con JS -->
</div>

<!-- Horizontal Cards Container (optional layout) -->
<div id="horizontalRatesContainer" class="horizontal-rates-container hidden">
  <!-- Cards rendered by JS -->
</div>

<!-- Last Update Timestamp -->
<div id="last-update" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Floating Navigation -->
<nav class="floating-nav">
  <div class="floating-nav-inner">
    <a href="/" data-nav-link class="nav-item active" aria-label="Inicio">
      <span class="nav-icon">📊</span>
    </a>
    <a href="/history" data-nav-link class="nav-item" aria-label="Historial">
      <span class="nav-icon">📈</span>
    </a>
    <a href="/provincias" data-nav-link class="nav-item" aria-label="Provincias">
      <span class="nav-icon">🗺️</span>
    </a>
    <a href="/alerts" data-nav-link class="nav-item" aria-label="Alertas">
      <span class="nav-icon">🔔</span>
    </a>
    <a href="/imagen" data-nav-link class="nav-item" aria-label="Imagen">
      <span class="nav-icon">📸</span>
    </a>
    <a href="/settings" data-nav-link class="nav-item" aria-label="Ajustes">
      <span class="nav-icon">⚙️</span>
    </a>
  </div>
</nav>

<script>
  // Fix navigation links to include base path if needed
  document.querySelectorAll('[data-nav-link]').forEach(link => {
    const basePath = window.TASALO_BASE_PATH || '';
    const href = link.getAttribute('href');
    if (basePath && !href.startsWith(basePath)) {
      link.setAttribute('href', basePath + href);
    }
  });
  
  // Set active nav item based on current page
  const currentPath = window.location.pathname.replace('/miniapp', '') || '/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = item.getAttribute('href');
    if (href === currentPath || (currentPath === '/' && href === '/')) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/telegram-miniapp.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
