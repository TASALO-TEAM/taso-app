{% extends "base.html" %}

{% block title %}TASALO - Provincias{% endblock %}

{% block content %}
<!-- Header -->
<header class="page-header">
  <h1 class="page-title">🗺️ Provincias</h1>
  <select id="source-select" class="bg-glass border border-white/10 rounded-lg px-3 py-2 text-sm font-mono text-accent focus:outline-none focus:border-accent">
    <option value="eltoque">📱 ElToque</option>
    <option value="cadeca">🏪 CADECA</option>
    <option value="bcc">🏛️ BCC</option>
  </select>
</header>

<!-- Loading State (Skeleton) -->
<div id="loading" class="space-y-4">
  <div class="glass-card-v2">
    <div class="skeleton-v2 h-6 w-48 mb-4 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-2/3 rounded"></div>
  </div>
  <div class="glass-card-v2">
    <div class="skeleton-v2 h-6 w-48 mb-4 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-full mb-2 rounded"></div>
    <div class="skeleton-v2 h-10 w-2/3 rounded"></div>
  </div>
</div>

<!-- Error State -->
<div id="error" class="hidden bg-red-900/20 border border-red-500/30 rounded-lg p-4 text-red-400">
  <p class="font-medium">⚠️ Error al cargar datos</p>
  <p class="text-sm mt-1">Verifica tu conexión e intenta nuevamente.</p>
  <button id="retry-btn" class="mt-3 btn-primary-v2 text-sm py-2 px-4">
    Reintentar
  </button>
</div>

<!-- Provincias Container -->
<div id="provincias-container" class="space-y-4 hidden">
  <!-- Tarjetas de provincias se renderizan dinámicamente -->
</div>

<!-- Last Update Timestamp -->
<div id="provincias-timestamp" class="text-center text-3 text-sm mt-4 mb-16"></div>

<!-- Floating Navigation -->
<nav class="floating-nav">
  <div class="floating-nav-inner">
    <a href="/" data-nav-link class="nav-item" aria-label="Inicio">
      <span class="nav-icon">📊</span>
    </a>
    <a href="/history" data-nav-link class="nav-item" aria-label="Historial">
      <span class="nav-icon">📈</span>
    </a>
    <a href="/provincias" data-nav-link class="nav-item active" aria-label="Provincias">
      <span class="nav-icon">🗺️</span>
    </a>
    <a href="/alerts" data-nav-link class="nav-item" aria-label="Alertas">
      <span class="nav-icon">🔔</span>
    </a>
    <a href="/imagen" data-nav-link class="nav-item" aria-label="Imagen">
      <span class="nav-icon">📸</span>
    </a>
    <a href="/settings" data-nav-link class="nav-item" aria-label="Ajustes">
      <span class="nav-icon">⚙️</span>
    </a>
  </div>
</nav>

<script>
  // Fix navigation links to include base path if needed
  document.querySelectorAll('[data-nav-link]').forEach(link => {
    const basePath = window.TASALO_BASE_PATH || '';
    const href = link.getAttribute('href');
    if (basePath && !href.startsWith(basePath)) {
      link.setAttribute('href', basePath + href);
    }
  });
  
  // Set active nav item based on current page
  const currentPath = window.location.pathname.replace('/miniapp', '') || '/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = item.getAttribute('href');
    if (href === currentPath) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/telegram-miniapp.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
