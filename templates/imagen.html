{% extends "base.html" %}

{% block title %}Imagen de Tasas — TASALO{% endblock %}

{% block head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Polaroid Image Viewer — ElToque Only */
  .polaroid-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding-bottom: 6rem;
  }

  /* Polaroid Frame */
  .polaroid-frame {
    width: 100%;
    max-width: 400px;
    background: #fefefe;
    border-radius: 3px;
    box-shadow:
      0 2px 20px rgba(0, 0, 0, 0.12),
      0 8px 40px rgba(0, 0, 0, 0.08);
    padding: 14px 14px 72px 14px;
    position: relative;
    transform: rotate(-0.5deg);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .polaroid-frame:hover {
    transform: rotate(0deg) scale(1.005);
  }

  body.theme-light .polaroid-frame {
    box-shadow:
      0 2px 20px rgba(0, 0, 0, 0.08),
      0 8px 40px rgba(0, 0, 0, 0.06);
  }

  .polaroid-image-wrapper {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #e8e8e8;
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .polaroid-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .polaroid-image-wrapper.loading {
    position: relative;
  }

  .polaroid-image-wrapper.loading::after {
    content: '';
    width: 28px;
    height: 28px;
    border: 2.5px solid #ccc;
    border-top-color: #5b8aff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
  }

  /* Marketing Caption (Polaroid caption strip) */
  .polaroid-caption {
    position: absolute;
    bottom: 10px;
    left: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-align: center;
  }

  .polaroid-bot-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #1a1a2e 0%, #3b6ee8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .polaroid-bot-handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #3b6ee8;
    letter-spacing: 0.03em;
  }

  .polaroid-bot-tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 8px;
    color: #999;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* Timestamp */
  .image-timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Refresh button in header */
  .refresh-btn-header {
    padding: 0.5rem 1rem;
    border-radius: var(--r);
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .refresh-btn-header:hover {
    background: var(--accent);
    color: #fff;
  }

  /* Error State */
  .polaroid-error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 2rem 1.5rem;
    text-align: center;
    color: var(--text2);
  }

  .polaroid-error svg {
    width: 40px;
    height: 40px;
    stroke: var(--text3);
    fill: none;
    stroke-width: 1.5;
  }

  .polaroid-error-msg {
    font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
{% endblock %}

{% block content %}
<header class="page-header">
  <h1 class="page-title">📸 ToqueImg</h1>
  <button id="refresh-btn" class="back-button" aria-label="Actualizar imagen">
    <span>⟳</span>
  </button>
</header>

<div class="polaroid-container">
  <!-- Polaroid Frame -->
  <div class="polaroid-frame" id="polaroid-frame">
    <div class="polaroid-image-wrapper loading" id="rates-image-container">
      <!-- Image or loading spinner -->
    </div>

    <!-- Marketing Caption (Polaroid-style caption strip) -->
    <div class="polaroid-caption">
      <div class="polaroid-bot-brand">TASALO</div>
      <div class="polaroid-bot-handle">@tasalobot</div>
      <div class="polaroid-bot-tagline">Tasas de cambio Cuba · Tiempo real</div>
    </div>
  </div>

  <!-- Timestamp -->
  <div class="image-timestamp" id="image-timestamp">Cargando imagen...</div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/telegram-miniapp.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
  // ElToque Image Viewer — uses the captured image from /toqueimg
  let imageLoaded = false;

  // The endpoint for the actual ElToque image file (same as /toqueimg in bot)
  function getImageUrl() {
    const apiBase = window.TASALO_API_URL || '';
    return `${apiBase}/api/v1/images/eltoque/file/latest?t=${Date.now()}`;
  }

  async function loadImage() {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.add('loading');
    container.innerHTML = '';
    timestamp.textContent = 'Cargando imagen...';

    try {
      const imageUrl = getImageUrl();

      const img = new Image();
      img.onload = function() {
        container.classList.remove('loading');
        container.innerHTML = '';
        container.appendChild(img);
        imageLoaded = true;

        const now = new Date();
        timestamp.textContent = `Actualizado: ${now.toLocaleTimeString('es-CU', { hour: '2-digit', minute: '2-digit' })}`;

        if (tgMiniApp && tgMiniApp.isInsideTelegram) {
          tgMiniApp.haptic('success');
        }
      };

      img.onerror = function() {
        showError();
      };

      img.src = imageUrl;
    } catch (error) {
      console.error('[TASALO] Image load error:', error);
      showError();
    }
  }

  function showError() {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.remove('loading');
    container.innerHTML = `
      <div class="polaroid-error">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div class="polaroid-error-msg">No se pudo cargar la imagen</div>
        <button class="refresh-btn-header" onclick="loadImage()">Reintentar</button>
      </div>
    `;
    timestamp.textContent = 'Error al cargar';

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('error');
    }
  }

  function refreshImage() {
    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('tap');
    }
    loadImage();
  }

  // Refresh button
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      if (tgMiniApp) tgMiniApp.haptic('tap');
      refreshImage();
    });
  }

  // Load image on page load
  document.addEventListener('DOMContentLoaded', () => {
    loadImage();
  });
</script>
{% endblock %}
