{% extends "base.html" %}

{% block title %}Imagen de Tasas — TASALO{% endblock %}

{% block head %}
<style>
  /* Image Viewer Styles */
  .image-viewer-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding-bottom: 6rem;
  }

  .image-viewer-header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem 0;
    text-align: center;
  }

  .image-viewer-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .image-viewer-subtitle {
    font-size: 0.875rem;
    color: var(--text2);
  }

  .image-wrapper {
    width: 100%;
    max-width: 500px;
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--bg-glass, rgba(255,255,255,0.08));
    backdrop-filter: blur(var(--glass-blur, 32px));
    -webkit-backdrop-filter: blur(var(--glass-blur, 32px));
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    position: relative;
  }

  .image-wrapper img {
    width: 100%;
    height: auto;
    display: block;
  }

  .image-wrapper.loading {
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-wrapper.loading::after {
    content: '';
    width: 32px;
    height: 32px;
    border: 3px solid var(--text2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .image-timestamp {
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    color: var(--text3);
    text-align: center;
  }

  .image-source-selector {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .source-btn {
    padding: 0.375rem 0.75rem;
    border-radius: var(--r);
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text2);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .source-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text);
  }

  .source-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .image-actions {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 500px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-radius: var(--r);
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .action-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .image-error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 2rem;
    text-align: center;
    color: var(--text2);
  }

  .image-error svg {
    width: 48px;
    height: 48px;
    stroke: var(--text3);
    fill: none;
    stroke-width: 1.5;
  }

  .refresh-btn {
    padding: 0.5rem 1rem;
    border-radius: var(--r);
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .refresh-btn:hover {
    background: var(--accent);
    color: #fff;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
{% endblock %}

{% block content %}
<div class="image-viewer-container">
  <!-- Header -->
  <div class="image-viewer-header">
    <div class="image-viewer-title">📊 Imagen de Tasas</div>
    <div class="image-viewer-subtitle">Gráfico actualizado con las últimas tasas</div>
  </div>

  <!-- Source Selector -->
  <div class="image-source-selector">
    <button class="source-btn active" data-source="tasalo">📊 Tasalo</button>
    <button class="source-btn" data-source="eltoque">📈 El Toque</button>
    <button class="source-btn" data-source="bcc">🏛 BCC</button>
    <button class="source-btn" data-source="cadeca">🏢 CADECA</button>
  </div>

  <!-- Image Container -->
  <div class="image-wrapper loading" id="rates-image-container">
    <!-- Image or error will be rendered here -->
  </div>

  <!-- Timestamp -->
  <div class="image-timestamp" id="image-timestamp">Cargando...</div>

  <!-- Action Buttons -->
  <div class="image-actions">
    <button class="action-btn" id="download-btn" onclick="downloadImage()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar
    </button>
    <button class="action-btn" id="share-btn" onclick="shareImage()">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartir
    </button>
    <button class="refresh-btn" id="refresh-image-btn" onclick="refreshImage()">🔄 Actualizar</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/telegram-miniapp.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
  // Image Viewer Page Logic
  let currentSource = 'tasalo';
  let imageLoaded = false;

  function getImageUrl(source) {
    const apiBase = window.TASALO_API_URL || '';
    return `${apiBase}/api/v1/images/rates?source=${source}&t=${Date.now()}`;
  }

  async function loadImage(source = currentSource) {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.add('loading');
    container.innerHTML = '';
    timestamp.textContent = 'Cargando imagen...';

    try {
      const imageUrl = getImageUrl(source);

      const img = new Image();
      img.onload = function() {
        container.classList.remove('loading');
        container.innerHTML = '';
        container.appendChild(img);
        imageLoaded = true;

        const now = new Date();
        timestamp.textContent = `Actualizado: ${now.toLocaleTimeString('es-CU', { hour: '2-digit', minute: '2-digit' })}`;

        if (tgMiniApp && tgMiniApp.isInsideTelegram) {
          tgMiniApp.haptic('success');
        }
      };

      img.onerror = function() {
        showError();
      };

      img.src = imageUrl;
    } catch (error) {
      console.error('[TASALO] Image load error:', error);
      showError();
    }
  }

  function showError() {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.remove('loading');
    container.innerHTML = `
      <div class="image-error">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div>No se pudo cargar la imagen</div>
        <button class="refresh-btn" onclick="loadImage()">Reintentar</button>
      </div>
    `;
    timestamp.textContent = 'Error al cargar';

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('error');
    }
  }

  async function downloadImage() {
    if (!imageLoaded) return;

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      const today = new Date().toISOString().split('T')[0];

      try {
        const success = await tgMiniApp.downloadFile(imageUrl, `tasas_cuba_${today}.png`);
        if (!success) {
          fallbackDownload(imageUrl);
        }
      } catch (e) {
        fallbackDownload(imageUrl);
      }
    } else {
      // Standalone browser: fallback download
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      fallbackDownload(imageUrl);
    }
  }

  function fallbackDownload(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `tasas_cuba_${new Date().toISOString().split('T')[0]}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function shareImage() {
    if (!imageLoaded) return;

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      // Open image in Telegram for sharing
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      tgMiniApp.getRaw().openLink(imageUrl);
    } else {
      // Web Share API (if available)
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Tasas de Cambio Cuba — TASALO',
            text: 'Últimas tasas de cambio del dólar en Cuba',
            url: imageUrl,
          });
        } catch (e) {
          // User cancelled share
        }
      } else {
        // Fallback: copy URL
        try {
          await navigator.clipboard.writeText(imageUrl);
          if (tgMiniApp) {
            tgMiniApp.showAlert('URL copiada al portapapeles');
          } else {
            alert('URL copiada al portapapeles');
          }
        } catch (e) {
          // Fallback failed
        }
      }
    }
  }

  function refreshImage() {
    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('tap');
    }
    loadImage();
  }

  // Source button handlers
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSource = btn.dataset.source;
      loadImage(currentSource);

      if (tgMiniApp && tgMiniApp.isInsideTelegram) {
        tgMiniApp.haptic('select');
      }
    });
  });

  // Load image on page load
  document.addEventListener('DOMContentLoaded', () => {
    loadImage('tasalo');
  });
</script>
{% endblock %}
