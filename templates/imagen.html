{% extends "base.html" %}

{% block title %}Imagen de Tasas — TASALO{% endblock %}

{% block head %}
<style>
  /* Polaroid Image Viewer */
  .polaroid-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding-bottom: 6rem;
  }

  .polaroid-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .polaroid-title {
    font-size: 1.125rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Polaroid Frame */
  .polaroid-frame {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 4px;
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.15),
      0 12px 48px rgba(0, 0, 0, 0.1),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    padding: 16px 16px 80px 16px;
    position: relative;
    transform: rotate(-1deg);
    transition: transform 0.3s ease;
  }

  .polaroid-frame:hover {
    transform: rotate(0deg) scale(1.01);
  }

  body.theme-light .polaroid-frame {
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.1),
      0 12px 48px rgba(0, 0, 0, 0.08),
      0 0 0 1px rgba(0, 0, 0, 0.08);
  }

  .polaroid-image-wrapper {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #f0f0f0;
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .polaroid-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .polaroid-image-wrapper.loading {
    position: relative;
  }

  .polaroid-image-wrapper.loading::after {
    content: '';
    width: 32px;
    height: 32px;
    border: 3px solid #ccc;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    position: absolute;
  }

  /* Polaroid Caption Area (Marketing) */
  .polaroid-caption {
    position: absolute;
    bottom: 12px;
    left: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }

  .polaroid-bot-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 0.05em;
  }

  .polaroid-bot-handle {
    font-size: 11px;
    color: #5b8aff;
    font-weight: 600;
  }

  .polaroid-bot-tagline {
    font-size: 9px;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .polaroid-bot-qr {
    width: 32px;
    height: 32px;
    margin-top: 2px;
    opacity: 0.6;
  }

  /* Source Selector */
  .image-source-selector {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .source-btn {
    padding: 0.375rem 0.75rem;
    border-radius: var(--r);
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text2);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .source-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text);
  }

  .source-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Action Buttons */
  .image-actions {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 420px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-radius: var(--r);
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .action-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .action-btn.primary {
    background: linear-gradient(135deg, var(--accent) 0%, #4a75e8 100%);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .refresh-btn {
    padding: 0.5rem 1rem;
    border-radius: var(--r);
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .refresh-btn:hover {
    background: var(--accent);
    color: #fff;
  }

  /* Error State */
  .polaroid-error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 2rem;
    text-align: center;
    color: var(--text2);
  }

  .polaroid-error svg {
    width: 48px;
    height: 48px;
    stroke: var(--text3);
    fill: none;
    stroke-width: 1.5;
  }

  /* Timestamp */
  .image-timestamp {
    font-size: 0.75rem;
    color: var(--text3);
    text-align: center;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/telegram-miniapp.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
  // Polaroid Image Viewer Page Logic
  let currentSource = 'tasalo';
  let imageLoaded = false;

  function getImageUrl(source) {
    const apiBase = window.TASALO_API_URL || '';
    return `${apiBase}/api/v1/images/rates?source=${source}&t=${Date.now()}`;
  }

  async function loadImage(source = currentSource) {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.add('loading');
    container.innerHTML = '';
    timestamp.textContent = 'Cargando imagen...';

    try {
      const imageUrl = getImageUrl(source);

      const img = new Image();
      img.onload = function() {
        container.classList.remove('loading');
        container.innerHTML = '';
        container.appendChild(img);
        imageLoaded = true;

        const now = new Date();
        timestamp.textContent = `Actualizado: ${now.toLocaleTimeString('es-CU', { hour: '2-digit', minute: '2-digit' })}`;

        if (tgMiniApp && tgMiniApp.isInsideTelegram) {
          tgMiniApp.haptic('success');
        }
      };

      img.onerror = function() {
        showError();
      };

      img.src = imageUrl;
    } catch (error) {
      console.error('[TASALO] Image load error:', error);
      showError();
    }
  }

  function showError() {
    const container = document.getElementById('rates-image-container');
    const timestamp = document.getElementById('image-timestamp');

    container.classList.remove('loading');
    container.innerHTML = `
      <div class="polaroid-error">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div>No se pudo cargar la imagen</div>
        <button class="refresh-btn" onclick="loadImage()">Reintentar</button>
      </div>
    `;
    timestamp.textContent = 'Error al cargar';

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('error');
    }
  }

  async function downloadImage() {
    if (!imageLoaded) return;

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      const today = new Date().toISOString().split('T')[0];

      try {
        const success = await tgMiniApp.downloadFile(imageUrl, `tasas_cuba_${today}.png`);
        if (!success) {
          fallbackDownload(imageUrl);
        }
      } catch (e) {
        fallbackDownload(imageUrl);
      }
    } else {
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      fallbackDownload(imageUrl);
    }
  }

  function fallbackDownload(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `tasas_cuba_${new Date().toISOString().split('T')[0]}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function shareImage() {
    if (!imageLoaded) return;

    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;
      tgMiniApp.getRaw().openLink(imageUrl);
    } else {
      const apiBase = window.TASALO_API_URL || '';
      const imageUrl = `${apiBase}/api/v1/images/rates?source=${currentSource}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Tasas de Cambio Cuba — TASALO',
            text: 'Últimas tasas de cambio del dólar en Cuba',
            url: imageUrl,
          });
        } catch (e) {
          // User cancelled
        }
      }
    }
  }

  function refreshImage() {
    if (tgMiniApp && tgMiniApp.isInsideTelegram) {
      tgMiniApp.haptic('tap');
    }
    loadImage();
  }

  // Source button handlers
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSource = btn.dataset.source;
      loadImage(currentSource);

      if (tgMiniApp && tgMiniApp.isInsideTelegram) {
        tgMiniApp.haptic('select');
      }
    });
  });

  // Refresh button
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      if (tgMiniApp) tgMiniApp.haptic('tap');
      refreshImage();
    });
  }

  // Load image on page load
  document.addEventListener('DOMContentLoaded', () => {
    loadImage('tasalo');
  });
</script>
{% endblock %}
