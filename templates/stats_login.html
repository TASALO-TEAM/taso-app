<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TASALO Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0088cc',
                        primaryDark: '#006699',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🔐 TASALO</h1>
            <p class="text-blue-200">Acceso a Estadísticas</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/20">
            <form method="POST" class="space-y-6">
                <div>
                    <label for="api_key" class="block text-sm font-medium text-blue-100 mb-2">
                        API Key de Administrador
                    </label>
                    <input
                        type="password"
                        id="api_key"
                        name="api_key"
                        required
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-blue-300/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="Ingresa tu API key"
                    >
                </div>

                {% if error %}
                <div class="bg-red-500/20 border border-red-500/50 rounded-lg p-3 text-red-200 text-sm text-center">
                    {{ error }}
                </div>
                {% endif %}

                <button
                    type="submit"
                    class="w-full bg-primary hover:bg-primaryDark text-white font-semibold py-3 rounded-lg transition-all duration-200 shadow-lg hover:shadow-primary/50"
                >
                    Ingresar
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-blue-200 hover:text-white text-sm transition-colors">
                    ← Volver al inicio
                </a>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-blue-300/60 text-xs mt-6">
            Solo para administradores autorizados
        </p>
    </div>
</body>
</html>
